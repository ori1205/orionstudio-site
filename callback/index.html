<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion Studio</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg:#0b0d12; --panel:#131720; --text:#e8eaf0; --muted:#9aa3b2; --accent:#51e8b3; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:var(--panel); border-radius:16px; padding:36px; max-width:560px; width:100%;
          border:1px solid #232a38; text-align:center; }
  .logo { font-size:1.4rem; font-weight:800; margin-bottom:18px; }
  .logo span { color:var(--accent); }
  h1 { font-size:1.15rem; margin-bottom:10px; }
  p { color:var(--muted); line-height:1.6; font-size:0.95rem; }
  #codigo { margin:22px 0; background:#0b0d12; border:1px dashed var(--accent); border-radius:10px;
            padding:16px; font-family:Consolas,monospace; font-size:0.85rem; word-break:break-all;
            color:var(--accent); }
  button { background:var(--accent); color:#0b0d12; border:none; border-radius:10px;
           padding:12px 22px; font-size:0.95rem; font-weight:700; cursor:pointer; }
  #copiado { color:var(--accent); font-size:0.85rem; margin-top:10px; visibility:hidden; }
  .error { color:#ff5470; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Orion <span>Studio</span></div>
  <div id="contenido">
    <h1>Authorization received ✓</h1>
    <p>TikTok has authorized Orion Studio. Copy the code below and paste it
       into the application to finish connecting your account.</p>
    <div id="codigo">…</div>
    <button onclick="copiar()">Copy code</button>
    <div id="copiado">Copied ✓</div>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const cont = document.getElementById('contenido');
  if (error) {
    cont.innerHTML = '<h1 class="error">Authorization failed</h1>' +
        '<p>' + error + (params.get('error_description') ? ': ' +
        params.get('error_description') : '') + '</p>';
  } else if (code) {
    document.getElementById('codigo').textContent = window.location.href;
  } else {
    cont.innerHTML = '<h1>Orion Studio — OAuth callback</h1>' +
        '<p>This page receives the authorization response from TikTok during ' +
        'account connection. No authorization code is present in this request.</p>';
  }
  function copiar() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      document.getElementById('copiado').style.visibility = 'visible';
    });
  }
</script>
</body>
</html>
